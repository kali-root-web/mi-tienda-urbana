<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Tienda de Ropa Urbana</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative overflow-x-hidden">

  <!-- Toast Notification container -->
  <div id="toast-container" class="fixed z-50 bottom-7 right-7 flex flex-col gap-3 items-end"></div>

  <!-- Mini menú hamburguesa para filtros arriba a la izquierda -->
  <div id="mini-menu-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-30 transition-opacity hidden"></div>
  <div id="mini-menu" class="absolute left-4 top-[76px] md:top-[84px] bg-white rounded-xl shadow-xl border w-64 z-50 p-4 transition-all duration-200 opacity-0 pointer-events-none">
    <div class="mb-3 flex justify-between items-center border-b pb-1">
      <h3 class="font-bold text-lg text-black">Filtros</h3>
      <button onclick="window.toggleMiniMenu(false)" class="text-2xl text-gray-400 hover:text-black" aria-label="Cerrar">×</button>
    </div>
    <form id="mini-menu-form" class="flex flex-col gap-3">
      <div>
        <label for="mini-menu-genero" class="block font-semibold mb-1">Género</label>
        <select id="mini-menu-genero" name="genero" class="w-full rounded border border-gray-300 bg-gray-50 px-2 py-1">
          <option value="">Todos</option>
          <option value="Hombre">Hombre</option>
          <option value="Mujer">Mujer</option>
          <option value="Unisex">Unisex</option>
        </select>
      </div>
      <div>
        <label for="mini-menu-talle" class="block font-semibold mb-1">Talle</label>
        <select id="mini-menu-talle" name="talle" class="w-full rounded border border-gray-300 bg-gray-50 px-2 py-1">
          <option value="">Todos</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
        </select>
      </div>
      <div>
        <label for="mini-menu-temporada" class="block font-semibold mb-1">Temporada</label>
        <select id="mini-menu-temporada" name="temporada" class="w-full rounded border border-gray-300 bg-gray-50 px-2 py-1">
          <option value="">Todas</option>
          <option value="Verano">Verano</option>
          <option value="Invierno">Invierno</option>
          <option value="Otoño">Otoño</option>
          <option value="Primavera">Primavera</option>
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="flex-1 bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700 transition-all">Aplicar</button>
        <button type="button" onclick="window.clearMiniMenu()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-black font-bold py-2 rounded-lg transition-all">Limpiar</button>
      </div>
    </form>
  </div>

  <!-- Sidebar menú hamburguesa (se mantiene inalterado y oculto)-->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-40 transition-opacity hidden"></div>
  <aside id="sidebar-menu" class="fixed top-0 left-0 w-80 max-w-full h-full bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <!-- ...sidebar unchanged... -->
    <!-- ...el contenido del sidebar se mantiene igual que antes... -->
    <!-- ... -->
  </aside>

  <!-- Modal Detalles Producto (tailwind, z-50, fixed inset-0, fondo negro semi) -->
  <div id="modal-producto"
    class="fixed inset-0 z-50 bg-black bg-opacity-60 flex items-center justify-center transition-opacity duration-300 hidden">
    <div class="relative bg-white rounded-2xl max-w-md w-full mx-4 p-6 md:p-10 shadow-xl flex flex-col items-stretch">
      <button type="button" id="btn-cerrar-modal"
        class="absolute top-3 right-4 text-3xl text-gray-300 hover:text-black z-10"
        aria-label="Cerrar modal" onclick="window.cerrarModal()">&times;</button>
      <!-- Carrusel de imágenes -->
      <div id="modal-producto-img"
        class="w-full aspect-square mb-4 rounded-xl shadow-md bg-gray-100 flex items-center justify-center justify-center overflow-hidden relative"
        style="min-height:180px"></div>
      <div class="flex justify-center gap-2 mb-2" id="modal-carrusel-dots"></div>
      <h2 id="modal-producto-nombre" class="text-2xl font-bold mb-2"></h2>
      <div class="text-indigo-600 font-black text-xl mb-2">$<span id="modal-producto-precio"></span></div>
      <div class="mb-3 flex flex-col md:flex-row md:gap-4">
        <div class="flex-1 mb-1">
          <label class="font-semibold text-gray-700 mb-1 block" for="modal-producto-color">Color</label>
          <select id="modal-producto-color"
              class="w-full bg-gray-50 border border-gray-300 rounded p-2 focus:outline-none focus:border-black transition disabled:bg-gray-100"
              ></select>
        </div>
        <div class="flex-1 mb-1">
          <label class="font-semibold text-gray-700 mb-1 block" for="modal-producto-talle">Talle</label>
          <select id="modal-producto-talle"
              class="w-full bg-gray-50 border border-gray-300 rounded p-2 focus:outline-none focus:border-black transition disabled:bg-gray-100"
              ></select>
        </div>
      </div>
      <button
        id="modal-btn-add-carrito"
        class="w-full bg-black text-white py-3 rounded-xl font-bold mt-3 hover:bg-gray-800 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
        Añadir al Carrito
      </button>
    </div>
  </div>

  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="p-4 flex justify-between items-center max-w-7xl mx-auto">
      <div class="flex items-center gap-3 relative">
        <!-- Botón menú hamburguesa mini-menu (filtros) arriba a la izquierda -->
        <button id="btn-mini-menu" class="text-3xl px-3 py-2 mr-2 focus:outline-none hover:bg-gray-200 rounded-lg" aria-label="Filtros">
          <svg width="28" height="28" fill="none" viewBox="0 0 24 24">
            <rect y="4" width="24" height="3" rx="1.5" fill="currentColor"/>
            <rect y="10.5" width="24" height="3" rx="1.5" fill="currentColor"/>
            <rect y="17" width="24" height="3" rx="1.5" fill="currentColor"/>
          </svg>
        </button>
        <h1 class="text-2xl font-black text-black tracking-tighter select-none">URBAN<span class="text-indigo-600">O.</span></h1>
      </div>
      <div class="flex gap-4 items-center">
        <!-- Filtro y orden -->
        <form id="form-filtrado" class="flex gap-2 items-center">
          <label for="select-orden" class="sr-only">Ordenar</label>
          <select id="select-orden" class="p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none focus:border-black min-w-[150px]">
            <option value="asc">Menor a Mayor precio</option>
            <option value="desc">Mayor a Menor precio</option>
          </select>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 transition-colors px-3 py-2 rounded-lg text-white font-bold shadow-sm text-sm">Filtrar</button>
        </form>
        <button onclick="window.toggleCarrito()" class="font-semibold bg-gray-100 py-2 px-4 rounded-full hover:bg-gray-200 transition-colors flex items-center gap-2">
          🛒 (<span id="contador-carrito">0</span>)
          <span class="text-xs text-gray-600 font-bold ml-2 bg-gray-200 px-2 py-1 rounded">
            $<span id="acumulado-carrito">0</span>
          </span>
        </button>
      </div>
    </div>
  </header>

  <main class="p-6 md:p-12 max-w-7xl mx-auto min-h-[60vh]">
    <!-- Productos Grid -->
    <div id="grilla-productos" class="grid grid-cols-1 xs:grid-cols-2 md:grid-cols-3 gap-8 transition-all"></div>
  </main>

  <!-- Carrito lateral -->
  <div id="carrito-lateral" class="fixed top-0 right-0 w-80 sm:w-96 h-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out p-6 z-50 flex flex-col">
    <div class="flex justify-between items-center mb-6 pb-4 border-b">
      <h2 class="text-2xl font-bold">Tu Pedido</h2>
      <button onclick="window.toggleCarrito()" class="text-gray-400 hover:text-black text-3xl leading-none">&times;</button>
    </div>
    <ul id="lista-carrito" class="flex-1 overflow-y-auto space-y-4 mb-6"></ul>
    <div class="border-t border-gray-200 pt-4 mt-auto">
      <div class="flex justify-between items-center mb-6">
        <p class="text-lg text-gray-500">Total a pagar:</p>
        <p class="text-2xl font-black">$<span id="total-carrito">0</span></p>
      </div>
      <button onclick="window.vaciarCarrito()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold text-lg hover:bg-red-600 transition-colors mb-3">
        Vaciar carrito
      </button>
      <button onclick="window.enviarWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 transition-colors">
        Finalizar en WhatsApp
      </button>
    </div>
  </div>

  <!-- Footer corporativo -->
  <footer class="mt-12 border-t bg-zinc-900 text-white w-full">
    <!-- ...footer unchanged... -->
    <!-- ... -->
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getFirestore, collection, getDocs, updateDoc, doc, increment
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase y catálogos
    const firebaseConfig = {
      apiKey: "AIzaSyDx8RYwqIC_-e5WL0QONC0O47MaeISpsYg",
      authDomain: "tienda-urba.firebaseapp.com",
      projectId: "tienda-urba",
      storageBucket: "tienda-urba.appspot.com",
      messagingSenderId: "224415070523",
      appId: "1:224415070523:web:0c1b10e48cb5440f0cdf1e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let catalogo = [];
    let state = {
      filtro: {},
      orden: "asc",
      carrito: [],
      modal: { abierto: false, productoId: null, seleccion: { color: null, talle: null } },
      carrusel: {
        images: [],
        index: 0,
        dotsParent: null,
      }
    };

    // --- Mini menú de filtros logic ---
    function toggleMiniMenu(show = undefined) {
      const el = document.getElementById('mini-menu');
      const overlay = document.getElementById('mini-menu-overlay');
      if (show === undefined) {
        show = !(el.classList.contains('opacity-100'));
      }
      if (show) {
        overlay.classList.remove('hidden');
        setTimeout(()=>overlay.classList.add('opacity-100'), 1);
        el.classList.remove('pointer-events-none');
        el.classList.remove('opacity-0');
        el.classList.add('opacity-100');
        setTimeout(() => {
          document.getElementById('mini-menu').focus?.();
        }, 10);
      } else {
        overlay.classList.add('hidden');
        overlay.classList.remove('opacity-100');
        el.classList.remove('opacity-100');
        el.classList.add('opacity-0');
        el.classList.add('pointer-events-none');
      }
    }
    window.toggleMiniMenu = toggleMiniMenu;

    // Aplica los filtros desde el mini menú
    function applyMiniMenuFilters(event) {
      if(event) event.preventDefault();
      const genero = document.getElementById('mini-menu-genero').value;
      const talle = document.getElementById('mini-menu-talle').value;
      const temporada = document.getElementById('mini-menu-temporada').value;

      let filtroObj = {};
      if (genero) filtroObj.genero = genero;
      if (talle) filtroObj.talle = talle;
      if (temporada) filtroObj.estacion = temporada;
      state.filtro = {...state.filtro, ...filtroObj};

      window.mostrarProductos();
      toggleMiniMenu(false);
    }

    function clearMiniMenu() {
      document.getElementById('mini-menu-genero').value = '';
      document.getElementById('mini-menu-talle').value = '';
      document.getElementById('mini-menu-temporada').value = '';
      state.filtro = {};
      window.mostrarProductos();
      toggleMiniMenu(false);
    }
    window.clearMiniMenu = clearMiniMenu;

    document.addEventListener("DOMContentLoaded", () => {
      // Evento clic hamburguesa mini menú
      document.getElementById("btn-mini-menu").addEventListener("click", function(e){
        e.stopPropagation();
        toggleMiniMenu(true);
      });
      document.getElementById("mini-menu-overlay").addEventListener("click", function(){
        toggleMiniMenu(false);
      });
      document.getElementById("mini-menu-form").addEventListener("submit", applyMiniMenuFilters);
    });

    function filterByTalle(producto, talle) {
      if (!talle) return true;
      // Si existe stockPorVariante
      if (producto.stockPorVariante && typeof producto.stockPorVariante === "object") {
        for (let color in producto.stockPorVariante) {
          if (producto.stockPorVariante[color] && producto.stockPorVariante[color][talle] > 0) {
            return true;
          }
        }
        return false;
      }
      // Si no existe, mirar array de talles
      if (producto.talles && Array.isArray(producto.talles)) {
        return producto.talles.includes(talle);
      }
      return false;
    }

    // --- resto del código original sin cambios pero ajustando mostrarProductos para considerar talle ---
    function showToast(msg = "Agregado al carrito") {
      const toastCont = document.getElementById("toast-container");
      if (!toastCont) return;
      const toast = document.createElement("div");
      toast.className =
        "bg-black/90 text-white text-sm rounded-xl px-5 py-3 shadow-lg mb-2 animate-fade-in-up";
      toast.textContent = msg;
      toastCont.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("opacity-0");
        setTimeout(() => toast.remove(), 500);
      }, 2500);
    }
    {
      const s = document.createElement('style');
      s.innerHTML = `
        .animate-fade-in-up { opacity: 0; transform: translateY(20px); animation: fadeInUp .5s forwards; }
        @keyframes fadeInUp { to { opacity:1; transform: translateY(0); } }
        #mini-menu.opacity-100 { opacity:1 !important; pointer-events:all !important; }
        #mini-menu.opacity-0 { opacity:0 !important; pointer-events:none !important; }
      `;
      document.head.appendChild(s);
    }

    function mostrarProductos(forceFromFirestore = false) {
      const grid = document.getElementById('grilla-productos');
      grid.innerHTML = "";

      if (forceFromFirestore) {
        descargarCatalogo({ mostrarSolo: true });
        return;
      }
      let prods = [...catalogo];
      if (state.filtro && Object.keys(state.filtro).length > 0) {
        prods = prods.filter(p => {
          let ok = true;
          if (state.filtro.genero && p.genero !== state.filtro.genero) ok = false;
          if (state.filtro.talle && !filterByTalle(p, state.filtro.talle)) ok = false;
          if (state.filtro.tipo && p.tipo !== state.filtro.tipo) ok = false;
          if (state.filtro.estacion && (p.estacion || '').toLowerCase() !== state.filtro.estacion.toLowerCase()) ok = false;
          return ok;
        });
      }
      if (state.orden === "asc") {
        prods = prods.sort((a, b) => Number(a.precio || 0) - Number(b.precio || 0));
      } else {
        prods = prods.sort((a, b) => Number(b.precio || 0) - Number(a.precio || 0));
      }
      if (prods.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-xl text-gray-400 font-bold">No hay productos disponibles.</div>`;
        return;
      }
      prods.forEach(prod => {
        let mostrarImg = null;
        if (prod.colores && Array.isArray(prod.colores) && prod.colores.length > 0 &&
            prod.imagenesPorColor && typeof prod.imagenesPorColor === 'object') {
          const primerColor = prod.colores[0];
          if (prod.imagenesPorColor[primerColor] && Array.isArray(prod.imagenesPorColor[primerColor]) && prod.imagenesPorColor[primerColor][0]) {
            mostrarImg = prod.imagenesPorColor[primerColor][0];
          }
        }
        let figuraImagen;
        if (mostrarImg) {
          figuraImagen = `<img src="${mostrarImg}" alt="${prod.nombre || ''}" class="h-64 w-full object-cover rounded-xl group-hover:scale-110 transition-transform duration-500 bg-gray-100 select-none pointer-events-none" loading="lazy">`;
        } else {
          figuraImagen = `<div class="h-64 w-full bg-gray-200 flex items-center justify-center rounded-xl text-gray-400 text-4xl select-none">Sin imagen</div>`;
        }
        grid.innerHTML += `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-shadow group cursor-pointer flex flex-col"
            onclick="window.abrirModalDesdeCatalogo('${prod.id}')"
            role="button" tabindex="0" aria-label="Ver detalles de ${prod.nombre ? prod.nombre : 'Producto'}">
          <div class="overflow-hidden rounded-xl mb-4 bg-gray-100">
            ${figuraImagen}
          </div>
          <h3 class="text-xl font-bold mb-2">${prod.nombre ? prod.nombre : "Sin nombre"}</h3>
          <div class="text-indigo-600 font-black text-xl mb-1">$${prod.precio ? prod.precio : "--"}</div>
        </div>
        `;
      });
    }

    // ---- resto del JS igual que el original ----
    // (no modificado, igual que antes)
    // ...código previamente presente, sin cambios...

    // Copiado del original...
    function renderCarruselImagenes(images, rootId = 'modal-producto-img', dotsId = 'modal-carrusel-dots', selIdx = 0, nombre = '') {
      const cont = document.getElementById(rootId);
      const dotsCont = document.getElementById(dotsId);
      if (!cont) return;

      state.carrusel.images = images;
      state.carrusel.index = selIdx || 0;
      state.carrusel.dotsParent = dotsCont;

      function show(idx) {
        if(images.length === 0) {
          cont.innerHTML = `<div class="h-52 w-full bg-gray-200 flex items-center justify-center rounded-xl text-gray-400 text-4xl select-none">Sin imagen</div>`;
          if (dotsCont) dotsCont.innerHTML = '';
          return;
        }
        idx = (idx + images.length) % images.length;
        state.carrusel.index = idx;
        cont.innerHTML = `
          <img 
            src="${images[idx]}" 
            alt="${nombre || ''}" 
            class="object-contain max-h-72 w-full rounded-lg select-none transition-all duration-300"
            style="max-height:320px;min-height:160px;">
          <button id="carrusel-left" 
              class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/80 text-white rounded-full p-2 text-2xl" 
              style="z-index:1">
            &#8592;
          </button>
          <button id="carrusel-right" 
              class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/80 text-white rounded-full p-2 text-2xl" 
              style="z-index:1">
            &#8594;
          </button>
        `;

        if (dotsCont) {
          dotsCont.innerHTML = images.map((img, i) =>
            `<button 
               type="button"
               class="w-3 h-3 mx-1 rounded-full ${i === idx ? 'bg-indigo-600' : 'bg-gray-300'} transition"
               style="border:none;outline:none;"
               aria-label="Imagen ${i+1}"
               data-idx="${i}"
             ></button>`
          ).join("");
          Array.from(dotsCont.children).forEach(btn => {
            btn.onclick = () => show(parseInt(btn.dataset.idx));
          });
        }
        const btnLeft = document.getElementById('carrusel-left');
        const btnRight = document.getElementById('carrusel-right');
        if (btnLeft) btnLeft.onclick = e => {e.stopPropagation(); show(idx - 1);};
        if (btnRight) btnRight.onclick = e => {e.stopPropagation(); show(idx + 1);};
      }
      show(selIdx || 0);
    }

    function abrirModalDesdeCatalogo(id) {
      const prod = catalogo.find(p => (p.id == id));
      if (!prod) return;
      state.modal.abierto = true;
      state.modal.productoId = id;
      state.modal.seleccion = { color: null, talle: null };

      // Seleccionar el primer color disponible
      let colorActual = null;
      if (prod.colores && Array.isArray(prod.colores) && prod.colores.length > 0) {
        colorActual = prod.colores[0];
      }
      let imagenesColor = [];
      if (
        colorActual &&
        prod.imagenesPorColor &&
        Array.isArray(prod.imagenesPorColor[colorActual])
      ) {
        imagenesColor = prod.imagenesPorColor[colorActual];
      }
      renderCarruselImagenes(imagenesColor, "modal-producto-img", "modal-carrusel-dots", 0, prod.nombre);

      document.getElementById('modal-producto-nombre').textContent = prod.nombre ? prod.nombre : 'Sin nombre';
      document.getElementById('modal-producto-precio').textContent = prod.precio ? prod.precio : '--';

      const selectColor = document.getElementById('modal-producto-color');
      const selectTalle = document.getElementById('modal-producto-talle');
      let stockPorVariante = prod.stockPorVariante && typeof prod.stockPorVariante === 'object' ? prod.stockPorVariante : undefined;

      // --- Cambia carrusel de imágenes dependiendo del color seleccionado ---
      // Helper para actualizar imágenes cuando cambie el color
      function actualizarImagenesPorColor(nuevoColor) {
        let imgs = [];
        if (
          nuevoColor &&
          prod.imagenesPorColor &&
          Array.isArray(prod.imagenesPorColor[nuevoColor])
        ) {
          imgs = prod.imagenesPorColor[nuevoColor];
        }
        renderCarruselImagenes(imgs, "modal-producto-img", "modal-carrusel-dots", 0, prod.nombre);
      }

      if (!stockPorVariante || Object.keys(stockPorVariante).length === 0) {
        selectColor.innerHTML = "";
        (Array.isArray(prod.colores) ? prod.colores : []).forEach((color, i) => {
          let opt = document.createElement("option");
          opt.value = color;
          opt.textContent = color;
          selectColor.appendChild(opt);
        });
        selectTalle.innerHTML = "";
        (Array.isArray(prod.talles) ? prod.talles : []).forEach((talle, i) => {
          let opt = document.createElement("option");
          opt.value = talle;
          opt.textContent = talle;
          selectTalle.appendChild(opt);
        });
        if (selectColor.options.length) selectColor.selectedIndex = 0;
        if (selectTalle.options.length) selectTalle.selectedIndex = 0;

        document.getElementById('modal-btn-add-carrito').disabled = (selectColor.options.length === 0 || selectTalle.options.length === 0);

        document.getElementById('modal-btn-add-carrito').onclick = function() {
          const color = selectColor.value;
          const talle = selectTalle.value;
          if (!color || !talle) return;
          window.agregarAlCarritoModal(prod.id, color, talle);
        };

        // Al cambiar de color, el carrusel se actualiza
        selectColor.onchange = function () {
          actualizarImagenesPorColor(this.value);
        };

        document.getElementById('modal-producto').classList.remove('hidden');
        if (selectColor.options.length) actualizarImagenesPorColor(selectColor.value);
        return;
      }

      const coloresDisponibles = (prod.colores || []).filter(color => {
        if (!stockPorVariante[color]) return false;
        return Object.values(stockPorVariante[color]).some(v => v > 0);
      });
      selectColor.innerHTML = "";
      coloresDisponibles.forEach((color, i) => {
        let opt = document.createElement("option");
        opt.value = color;
        opt.textContent = color;
        selectColor.appendChild(opt);
      });

      if (coloresDisponibles.length === 0) {
        selectColor.innerHTML = `<option disabled selected>No disponible</option>`;
        selectTalle.innerHTML = `<option disabled selected>Selecciona color</option>`;
        document.getElementById('modal-btn-add-carrito').disabled = true;
        document.getElementById('modal-producto').classList.remove('hidden');
        return;
      } else {
        selectColor.selectedIndex = 0;
      }

      actualizarSelectTallesModal(prod, selectColor.value);

      // Al cambiar el color, se actualizan los talles y el carrusel de imágenes
      selectColor.onchange = function() {
        actualizarSelectTallesModal(prod, this.value);
        actualizarImagenesPorColor(this.value);
      };

      document.getElementById('modal-btn-add-carrito').onclick = function() {
        const color = selectColor.value;
        const talle = selectTalle.value;
        if (!color || !talle) return;
        if (stockPorVariante[color] && stockPorVariante[color][talle] > 0) {
          window.agregarAlCarritoModal(prod.id, color, talle);
        }
      };

      document.getElementById('modal-producto').classList.remove('hidden');
      if (selectColor.options.length) actualizarImagenesPorColor(selectColor.value);
    }

    function cerrarModal() {
      state.modal.abierto = false;
      state.modal.productoId = null;
      state.modal.seleccion = { color: null, talle: null };
      document.getElementById('modal-producto').classList.add('hidden');
    }
    window.cerrarModal = cerrarModal;

    function cerrarModalProducto() {
      cerrarModal();
    }

    function actualizarSelectTallesModal(prod, colorSeleccionado) {
      const selectTalle = document.getElementById('modal-producto-talle');
      let stockPorVariante = prod.stockPorVariante && typeof prod.stockPorVariante === 'object' ? prod.stockPorVariante : {};
      if (!stockPorVariante[colorSeleccionado]) {
        selectTalle.innerHTML = `<option disabled selected>No hay talles</option>`;
        document.getElementById('modal-btn-add-carrito').disabled = true;
        return;
      }
      const tallesDisponibles = Object.entries(stockPorVariante[colorSeleccionado])
        .filter(([_t, cantidad]) => cantidad > 0)
        .map(([talle, _]) => talle);

      selectTalle.innerHTML = "";
      tallesDisponibles.forEach((talle, i) => {
        let opt = document.createElement("option");
        opt.value = talle;
        opt.textContent = talle;
        selectTalle.appendChild(opt);
      });

      if (tallesDisponibles.length === 0) {
        selectTalle.innerHTML = `<option disabled selected>Sin stock</option>`;
        document.getElementById('modal-btn-add-carrito').disabled = true;
      } else {
        selectTalle.selectedIndex = 0;
        document.getElementById('modal-btn-add-carrito').disabled = false;
      }
    }

    // --------- CARRITO Y FINALIZACIÓN ---------
    function agregarAlCarritoModal(prodId, color, talle) {
      const prod = catalogo.find(p => p.id === prodId);
      if (!prod) return;
      const idx = state.carrito.findIndex(
        item => item.id === prodId && item.color === color && item.talle === talle
      );
      if (idx > -1) {
        state.carrito[idx].cantidad += 1;
      } else {
        state.carrito.push({
          id: prodId,
          nombre: prod.nombre || "",
          precio: prod.precio || 0,
          color,
          talle,
          cantidad: 1
        });
      }
      showToast("Producto añadido al carrito");
      cerrarModal();
      renderCarrito();
    }

    function renderCarrito() {
      const ul = document.getElementById('lista-carrito');
      ul.innerHTML = "";
      let total = 0;
      let cant = 0;
      state.carrito.forEach((item, i) => {
        total += (item.precio * item.cantidad);
        cant += item.cantidad;
        ul.innerHTML += `
          <li class="flex justify-between items-center gap-1 border-b pb-2">
            <div>
              <span class="font-bold">${item.nombre}</span><br>
              <span class="text-xs text-gray-500">${item.color} | ${item.talle}</span>
            </div>
            <div class="flex flex-col items-end">
              <span class="font-bold">$${item.precio} x ${item.cantidad}</span>
              <button onclick="window.eliminarDelCarrito(${i})" class="text-red-400 hover:text-red-600 text-xs mt-1 ml-auto">❌ Quitar</button>
            </div>
          </li>
        `;
      });
      document.getElementById('contador-carrito').textContent = cant;
      document.getElementById('acumulado-carrito').textContent = total;
      document.getElementById('total-carrito').textContent = total;
    }

    function eliminarDelCarrito(idx) {
      if (idx >= 0 && state.carrito[idx]) {
        state.carrito.splice(idx, 1);
        showToast("Eliminado del carrito");
        renderCarrito();
      }
    }

    function vaciarCarrito() {
      state.carrito = [];
      showToast("Carrito vaciado");
      renderCarrito();
    }

    async function enviarWhatsApp() {
      if (!state.carrito.length) {
        showToast("El carrito está vacío");
        return;
      }
      try {
        const updates = [];
        for (const item of state.carrito) {
          const producto = catalogo.find(x => x.id === item.id);
          if (!producto) continue;
          const productoRef = doc(db, "productos", item.id);
          const fieldPath = `stockPorVariante.${item.color}.${item.talle}`;
          let up = updateDoc(productoRef, {
            [fieldPath]: increment(-item.cantidad)
          });
          updates.push(up);
        }
        await Promise.all(updates);

        let mensaje = `Hola! Quiero hacer una compra:\n`;
        state.carrito.forEach(item => {
          mensaje += `${item.nombre} - Color: ${item.color}, Talle: ${item.talle} x${item.cantidad}\n`;
        });
        mensaje += `Total: $${state.carrito.reduce((t, i) => t + i.precio * i.cantidad, 0)}`;

        vaciarCarrito();

        const tel = '5493482600840';
        const url = `https://wa.me/${tel}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
        showToast("Redirigiendo a WhatsApp...");
      } catch (e) {
        showToast("Error al actualizar stock. Intenta de nuevo.");
        console.error(e);
      }
    }

    async function descargarCatalogo(options = {}) {
      try {
        const querySnapshot = await getDocs(collection(db, "productos"));
        let catalogoEnLaNube = [];
        querySnapshot.forEach((doc) => {
          let producto = doc.data();
          producto.id = doc.id;
          catalogoEnLaNube.push(producto);
        });
        window.catalogo = catalogo = catalogoEnLaNube;

        if (options && options.mostrarSolo) {
          mostrarProductos(false);
        } else {
          window.mostrarProductos();
        }
      } catch (error) {
        console.error("Hubo un error al conectar con la base de datos:", error);
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar-menu');
      const overlay = document.getElementById('sidebar-overlay');
      if (sidebar.classList.contains("-translate-x-full")) {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
      } else {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
      }
    }

    function toggleCollapse(tipo) {
      const submenu = document.getElementById(`submenu-${tipo}`);
      const icon = document.getElementById(`icon-${tipo}`);
      if (!submenu || !icon) return;
      if (submenu.classList.contains("hidden")) {
        submenu.classList.remove("hidden");
        icon.style.transform = "rotate(180deg)";
      } else {
        submenu.classList.add("hidden");
        icon.style.transform = "";
      }
    }

    function setFilter(filtroObj) {
      state.filtro = {...state.filtro, ...filtroObj};
      window.mostrarProductos();
    }

    function clearFilters() {
      state.filtro = {};
      window.mostrarProductos();
    }

    function filtrarOrdenar(event) {
      if (event) event.preventDefault();
      const orden = document.getElementById('select-orden').value;
      state.orden = orden;
      window.mostrarProductos();
    }

    function toggleCarrito() {
      const carrito = document.getElementById('carrito-lateral');
      if (carrito.classList.contains('translate-x-full')) {
        carrito.classList.remove('translate-x-full');
      } else {
        carrito.classList.add('translate-x-full');
      }
    }

    document.getElementById("form-filtrado").addEventListener("submit", filtrarOrdenar);

    window.mostrarProductos = mostrarProductos;
    window.abrirModalDesdeCatalogo = abrirModalDesdeCatalogo;
    window.toggleSidebar = toggleSidebar;
    window.toggleCollapse = toggleCollapse;
    window.setFilter = setFilter;
    window.clearFilters = clearFilters;
    window.toggleCarrito = toggleCarrito;
    window.filtrarOrdenar = filtrarOrdenar;
    window.eliminarDelCarrito = eliminarDelCarrito;
    window.vaciarCarrito = vaciarCarrito;
    window.enviarWhatsApp = enviarWhatsApp;
    window.agregarAlCarritoModal = agregarAlCarritoModal;
    window.cerrarModal = cerrarModal;
    window.descargarCatalogo = descargarCatalogo;

    descargarCatalogo();
    renderCarrito();

    window.addEventListener('focus', () => {
      mostrarProductos(true);
    });
    window.refrescarProductos = () => mostrarProductos(true);

  </script>
</body>
</html>
