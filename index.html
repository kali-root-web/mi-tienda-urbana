    <title>Tienda de Ropa Urbana</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-50 text-gray-800 font-sans relative overflow-x-hidden">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="p-4 flex justify-between items-center max-w-7xl mx-auto">
            <h1 class="text-2xl font-black text-black tracking-tighter">URBAN<span class="text-indigo-600">O.</span></h1>
            <button onclick="toggleCarrito()" class="font-semibold bg-gray-100 py-2 px-4 rounded-full hover:bg-gray-200 transition-colors flex items-center gap-2">
                🛒 (<span id="contador-carrito">0</span>)
                <span class="text-xs text-gray-600 font-bold ml-2 bg-gray-200 px-2 py-1 rounded">
                    $<span id="acumulado-carrito">0</span>
                </span>
            </button>
        </div>
        <nav class="flex gap-4 overflow-x-auto p-4 max-w-7xl mx-auto border-t border-gray-100 no-scrollbar">
            <button onclick="mostrarProductos('todos')" class="px-4 py-2 bg-black text-white rounded-full text-sm font-bold whitespace-nowrap">Todos</button>
            <button onclick="mostrarProductos('verano')" class="px-4 py-2 border border-gray-300 rounded-full text-sm font-bold hover:bg-gray-100 whitespace-nowrap">☀️ Verano</button>
            <button onclick="mostrarProductos('invierno')" class="px-4 py-2 border border-blue-300 rounded-full text-sm font-bold hover:bg-blue-50 whitespace-nowrap">❄️ Invierno</button>
        </nav>
    </header>

    <main class="p-6 md:p-12 max-w-7xl mx-auto">
        <div id="grilla-productos" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="carrito-lateral" class="fixed top-0 right-0 w-80 sm:w-96 h-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out p-6 z-20 flex flex-col">
        <div class="flex justify-between items-center mb-6 pb-4 border-b">
            <h2 class="text-2xl font-bold">Tu Pedido</h2>
            <button onclick="toggleCarrito()" class="text-gray-400 hover:text-black text-3xl leading-none">&times;</button>
        </div>
        <ul id="lista-carrito" class="flex-1 overflow-y-auto space-y-4 mb-6"></ul>
        <div class="border-t border-gray-200 pt-4 mt-auto">
            <div class="flex justify-between items-center mb-6">
                <p class="text-lg text-gray-500">Total a pagar:</p>
                <p class="text-2xl font-black">$<span id="total-carrito">0</span></p>
            </div>
            <button onclick="vaciarCarrito()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold text-lg hover:bg-red-600 transition-colors mb-3">
                Vaciar carrito
            </button>
            <button onclick="enviarWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 transition-colors">
                Finalizar en WhatsApp
            </button>
        </div>
    </div>

        // Función para obtener la primera imagen disponible según el objeto imagenesPorColor
        function obtenerPrimerImagen(producto) {
            // Se usa la primera clave (color) especificada en el array de colores
            const primerColor = producto.colores[0];
            return producto.imagenesPorColor[primerColor];
        }
        // función para manejar el cambio de color y actualizar la imagen
        function cambiarImagenProducto(id) {
            const producto = catalogo.find(p => p.id === id);
            const select = document.getElementById(`color-${id}`);
            const color = select.value;
            const img = document.getElementById(`imagen-prod-${id}`);
            img.src = producto.imagenesPorColor[color] || obtenerPrimerImagen(producto);
        }

        function mostrarProductos(filtro) {
            const contenedor = document.getElementById('grilla-productos');
            contenedor.innerHTML = ''; 

            let productosFiltrados = catalogo;
            if (filtro !== 'todos') {
                productosFiltrados = catalogo.filter(p => p.categoria === filtro);
            }

            productosFiltrados.forEach(producto => {
                let opcionesTalles = producto.talles.map(talle => `<option value="${talle}">${talle}</option>`).join('');
                let opcionesColores = producto.colores.map(color => `<option value="${color}">${color}</option>`).join('');
                const imagenPorDefecto = obtenerPrimerImagen(producto);

                contenedor.innerHTML += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-shadow">
                    
                    <img id="imagen-prod-${producto.id}" src="${imagenPorDefecto}" alt="${producto.nombre}" class="h-64 w-full object-cover rounded-xl mb-4 bg-gray-100">
                    
                    <h3 class="text-xl font-bold mb-2">${producto.nombre}</h3>
                    
                    <div class="flex gap-2 mb-4">
                        <select id="talle-${producto.id}" class="w-1/2 p-2 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:border-black">
                            ${opcionesTalles}
                        </select>
                        <select id="color-${producto.id}" class="w-1/2 p-2 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:border-black" onchange="cambiarImagenProducto(${producto.id})">
                            ${opcionesColores}
                        </select>
                    </div>

                    <p class="text-indigo-600 font-black text-xl mb-4">$${producto.precio}</p>
                    <button onclick="agregarAlCarrito(${producto.id}, '${producto.nombre}', ${producto.precio})" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition-colors">
                        Agregar al pedido
                    </button>
                </div>`;
            });
        }

        mostrarProductos('todos');

        let carrito = [];
        let total = 0;

        function toggleCarrito() {
            document.getElementById('carrito-lateral').classList.toggle('translate-x-full');
        }

        function agregarAlCarrito(id, nombre, precio) {
            const talleElegido = document.getElementById(`talle-${id}`).value;
            const colorElegido = document.getElementById(`color-${id}`).value;

            carrito.push({ id, nombre, precio, talle: talleElegido, color: colorElegido });
            total += precio;
            actualizarUI();
        }

        // Elimina solo un producto específico por su índice en el carrito
        function eliminarUnoDeCarrito(idx) {
            if (idx >= 0 && idx < carrito.length) {
                total -= carrito[idx].precio;
                carrito.splice(idx, 1);
                actualizarUI();
            }
        }

        // Borra todos los productos que tengan el mismo id, talle y color (mismo producto en el carrito, sin importar la cantidad)
        function borrarTodosDelProducto(id, talle, color) {
            // Buscamos los que coinciden y descontamos sus precios del total
            let sumaEliminada = 0;
            carrito = carrito.filter(item => {
                const esMismo = item.id === id && item.talle === talle && item.color === color;
                if (esMismo) sumaEliminada += item.precio;
                return !esMismo;
            });
            total -= sumaEliminada;
            actualizarUI();
        }

        function actualizarUI() {
            document.getElementById('contador-carrito').innerText = carrito.length;
            document.getElementById('total-carrito').innerText = total;
            document.getElementById('acumulado-carrito').innerText = total;
            const lista = document.getElementById('lista-carrito');
            lista.innerHTML = '';
            carrito.forEach((item, idx) => {
                lista.innerHTML += `
                <li class="bg-gray-50 p-3 rounded-lg flex flex-col gap-1 relative group">
                    <div class="flex justify-between items-center">
                        <span class="font-medium text-sm">${item.nombre}</span> 
                        <span class="font-bold text-indigo-600">$${item.precio}</span>
                    </div>
                    <span class="text-xs text-gray-500">Talle: ${item.talle} | Color: ${item.color}</span>
                    <div class="flex gap-2 mt-1">
                        <button onclick="eliminarUnoDeCarrito(${idx})" class="text-xs text-red-500 hover:underline">Eliminar uno</button>
                        <button onclick="borrarTodosDelProducto(${item.id}, '${item.talle.replace(/'/g, "\\'")}', '${item.color.replace(/'/g, "\\'")}')" class="text-xs text-red-700 hover:underline">Borrar todos</button>
                    </div>
                </li>`;
            });
        }

        function vaciarCarrito() {
            carrito = [];
            total = 0;
            actualizarUI();
        }

        function enviarWhatsApp() {
            if (carrito.length === 0) return alert("Agrega productos primero.");
            const numero = "5493482600840"; 
            let mensaje = "¡Hola! Quiero hacer este pedido:\n\n";
            carrito.forEach(item => mensaje += `▪️ ${item.nombre} (Talle: ${item.talle}, Color: ${item.color}) - $${item.precio}\n`);
            mensaje += `\n*TOTAL: $${total}*`;
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }
    </script>
