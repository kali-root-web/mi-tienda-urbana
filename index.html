<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Ropa Urbana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .animate-fade-in-up { opacity: 0; transform: translateY(20px); animation: fadeInUp .5s forwards; }
    @keyframes fadeInUp { to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative overflow-x-hidden">

  <div id="toast-container" class="fixed z-50 bottom-7 right-7 flex flex-col gap-3 items-end"></div>

  <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-40 transition-opacity hidden" onclick="window.toggleSidebar()"></div>
  <aside id="sidebar-menu" class="fixed top-0 left-0 w-80 max-w-full h-full bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center">
      <h2 class="text-2xl font-black">Menú</h2>
      <button onclick="window.toggleSidebar()" class="text-3xl text-gray-400 hover:text-black">&times;</button>
    </div>
    <nav class="flex-1 p-6 space-y-4">
      <a href="#" onclick="window.clearFilters(); window.toggleSidebar();" class="block text-lg font-bold hover:text-indigo-600">Todos los productos</a>
    </nav>
  </aside>

  <div id="modal-producto" class="fixed inset-0 z-50 bg-black bg-opacity-60 flex items-center justify-center transition-opacity duration-300 hidden">
    <div class="relative bg-white rounded-2xl max-w-md w-full mx-4 p-6 md:p-10 shadow-xl flex flex-col items-stretch">
      <button type="button" class="absolute top-3 right-4 text-3xl text-gray-300 hover:text-black z-10" onclick="window.cerrarModal()">&times;</button>
      
      <div id="modal-producto-img" class="w-full aspect-square mb-4 rounded-xl shadow-md bg-gray-100 flex items-center justify-center overflow-hidden relative" style="min-height:180px"></div>
      <div class="flex justify-center gap-2 mb-2" id="modal-carrusel-dots"></div>
      
      <h2 id="modal-producto-nombre" class="text-2xl font-bold mb-2"></h2>
      <div class="text-indigo-600 font-black text-xl mb-2">$<span id="modal-producto-precio"></span></div>
      
      <div class="mb-3 flex flex-col md:flex-row md:gap-4">
        <div class="flex-1 mb-1">
          <label class="font-semibold text-gray-700 mb-1 block" for="modal-producto-color">Color</label>
          <select id="modal-producto-color" class="w-full bg-gray-50 border border-gray-300 rounded p-2 focus:outline-none focus:border-black transition disabled:bg-gray-100"></select>
        </div>
        <div class="flex-1 mb-1">
          <label class="font-semibold text-gray-700 mb-1 block" for="modal-producto-talle">Talle</label>
          <select id="modal-producto-talle" class="w-full bg-gray-50 border border-gray-300 rounded p-2 focus:outline-none focus:border-black transition disabled:bg-gray-100"></select>
        </div>
      </div>
      <button id="modal-btn-add-carrito" class="w-full bg-black text-white py-3 rounded-xl font-bold mt-3 hover:bg-gray-800 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
        Añadir al Carrito
      </button>
    </div>
  </div>

  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="p-4 flex justify-between items-center max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <button onclick="window.toggleSidebar()" class="text-3xl px-3 py-2 mr-2 focus:outline-none hover:bg-gray-200 rounded-lg">
          <svg width="28" height="28" fill="none" viewBox="0 0 24 24">
            <rect y="4" width="24" height="3" rx="1.5" fill="currentColor"/>
            <rect y="10.5" width="24" height="3" rx="1.5" fill="currentColor"/>
            <rect y="17" width="24" height="3" rx="1.5" fill="currentColor"/>
          </svg>
        </button>
        <h1 class="text-2xl font-black text-black tracking-tighter select-none">URBAN<span class="text-indigo-600">O.</span></h1>
      </div>
      <div class="flex gap-4 items-center">
        <form onsubmit="window.filtrarOrdenar(event)" class="flex gap-2 items-center">
          <select id="select-orden" class="p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none focus:border-black min-w-[150px]">
            <option value="asc">Menor a Mayor precio</option>
            <option value="desc">Mayor a Menor precio</option>
          </select>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 transition-colors px-3 py-2 rounded-lg text-white font-bold text-sm">Filtrar</button>
        </form>
        <button onclick="window.toggleCarrito()" class="font-semibold bg-gray-100 py-2 px-4 rounded-full hover:bg-gray-200 transition-colors flex items-center gap-2">
          🛒 (<span id="contador-carrito">0</span>)
          <span class="text-xs text-gray-600 font-bold ml-2 bg-gray-200 px-2 py-1 rounded">$<span id="acumulado-carrito">0</span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="p-6 md:p-12 max-w-7xl mx-auto min-h-[60vh]">
    <div id="grilla-productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 transition-all"></div>
  </main>

  <div id="carrito-lateral" class="fixed top-0 right-0 w-80 sm:w-96 h-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 p-6 z-50 flex flex-col">
    <div class="flex justify-between items-center mb-6 pb-4 border-b">
      <h2 class="text-2xl font-bold">Tu Pedido</h2>
      <button onclick="window.toggleCarrito()" class="text-gray-400 hover:text-black text-3xl leading-none">&times;</button>
    </div>
    <ul id="lista-carrito" class="flex-1 overflow-y-auto space-y-4 mb-6"></ul>
    <div class="border-t border-gray-200 pt-4 mt-auto">
      <div class="flex justify-between items-center mb-6">
        <p class="text-lg text-gray-500">Total a pagar:</p>
        <p class="text-2xl font-black">$<span id="total-carrito">0</span></p>
      </div>
      <button onclick="window.vaciarCarrito()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold text-lg hover:bg-red-600 transition-colors mb-3">Vaciar carrito</button>
      <button onclick="window.enviarWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 transition-colors">Finalizar en WhatsApp</button>
    </div>
  </div>

  <footer class="mt-12 border-t bg-zinc-900 text-white w-full p-8 text-center">
    <p class="font-bold text-lg">URBANO. by Urban Corp</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDx8RYwqIC_-e5WL0QONC0O47MaeISpsYg",
      authDomain: "tienda-urba.firebaseapp.com",
      projectId: "tienda-urba",
      storageBucket: "tienda-urba.appspot.com",
      messagingSenderId: "224415070523",
      appId: "1:224415070523:web:0c1b10e48cb5440f0cdf1e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let catalogo = [];
    let state = {
      orden: "asc",
      carrito: [],
      modal: { productoId: null }
    };

    function showToast(msg) {
      const toastCont = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = "bg-black/90 text-white text-sm rounded-xl px-5 py-3 shadow-lg mb-2 animate-fade-in-up";
      toast.textContent = msg;
      toastCont.appendChild(toast);
      setTimeout(() => { toast.classList.add("opacity-0"); setTimeout(() => toast.remove(), 500); }, 2500);
    }

    async function descargarCatalogo() {
      try {
        const querySnapshot = await getDocs(collection(db, "productos"));
        catalogo = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        mostrarProductos();
      } catch (error) {
        console.error("Error al descargar catálogo:", error);
      }
    }

    function mostrarProductos() {
      const grid = document.getElementById('grilla-productos');
      grid.innerHTML = "";
      
      let prods = [...catalogo];
      prods = prods.sort((a, b) => state.orden === "asc" ? a.precio - b.precio : b.precio - a.precio);

      if (prods.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-xl text-gray-400 font-bold">No hay productos disponibles.</div>`;
        return;
      }

      prods.forEach(prod => {
        let primerImg = null;
        if (prod.colores && prod.colores.length > 0 && prod.imagenesPorColor) {
          const color0 = prod.colores[0];
          if (prod.imagenesPorColor[color0] && prod.imagenesPorColor[color0][0]) {
            primerImg = prod.imagenesPorColor[color0][0];
          }
        }
        
        const imgHtml = primerImg 
          ? `<img src="${primerImg}" class="h-64 w-full object-cover rounded-xl group-hover:scale-110 transition-transform duration-500">`
          : `<div class="h-64 w-full bg-gray-200 flex items-center justify-center rounded-xl text-gray-400">Sin imagen</div>`;

        grid.innerHTML += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg cursor-pointer group flex flex-col" onclick="window.abrirModalDesdeCatalogo('${prod.id}')">
            <div class="overflow-hidden rounded-xl mb-4 bg-gray-100">${imgHtml}</div>
            <h3 class="text-xl font-bold mb-2 capitalize">${prod.nombre || "Sin nombre"}</h3>
            <div class="text-indigo-600 font-black text-xl mb-1">$${prod.precio || "--"}</div>
          </div>
        `;
      });
    }

    function abrirModalDesdeCatalogo(id) {
      const prod = catalogo.find(p => p.id === id);
      if (!prod) return;
      
      state.modal.productoId = id;
      document.getElementById('modal-producto-nombre').textContent = prod.nombre;
      document.getElementById('modal-producto-precio').textContent = prod.precio;
      
      const selectColor = document.getElementById('modal-producto-color');
      const selectTalle = document.getElementById('modal-producto-talle');
      const imgContainer = document.getElementById('modal-producto-img');
      const btnAdd = document.getElementById('modal-btn-add-carrito');
      
      selectColor.innerHTML = "";
      
      const coloresConStock = (prod.colores || []).filter(c => {
        if (!prod.stockPorVariante || !prod.stockPorVariante[c]) return true; // Fallback si no hay estructura de stock
        return Object.values(prod.stockPorVariante[c]).some(v => v > 0);
      });

      if (coloresConStock.length === 0) {
        selectColor.innerHTML = `<option disabled selected>Sin stock</option>`;
        selectTalle.innerHTML = `<option disabled selected>Sin stock</option>`;
        imgContainer.innerHTML = `<div class="text-gray-400">Sin stock disponible</div>`;
        btnAdd.disabled = true;
      } else {
        coloresConStock.forEach(c => selectColor.innerHTML += `<option value="${c}">${c}</option>`);
        btnAdd.disabled = false;
        actualizarModalVariantes(prod, selectColor.value);
        
        selectColor.onchange = (e) => actualizarModalVariantes(prod, e.target.value);
        
        btnAdd.onclick = () => {
          window.agregarAlCarrito(prod.id, selectColor.value, selectTalle.value, prod.nombre, prod.precio);
        };
      }
      
      document.getElementById('modal-producto').classList.remove('hidden');
    }

    function actualizarModalVariantes(prod, color) {
      const selectTalle = document.getElementById('modal-producto-talle');
      const imgContainer = document.getElementById('modal-producto-img');
      
      selectTalle.innerHTML = "";
      let talles = [];
      if (prod.stockPorVariante && prod.stockPorVariante[color]) {
        talles = Object.entries(prod.stockPorVariante[color]).filter(([_, cant]) => cant > 0).map(([t, _]) => t);
      } else {
        talles = prod.talles || ["Único"];
      }
      
      talles.forEach(t => selectTalle.innerHTML += `<option value="${t}">${t}</option>`);
      
      if (prod.imagenesPorColor && prod.imagenesPorColor[color] && prod.imagenesPorColor[color][0]) {
        imgContainer.innerHTML = `<img src="${prod.imagenesPorColor[color][0]}" class="object-contain max-h-72 w-full rounded-lg">`;
      } else {
        imgContainer.innerHTML = `<div class="text-gray-400">Sin imagen</div>`;
      }
    }

    function cerrarModal() {
      document.getElementById('modal-producto').classList.add('hidden');
    }

    function agregarAlCarrito(id, color, talle, nombre, precio) {
      const idx = state.carrito.findIndex(i => i.id === id && i.color === color && i.talle === talle);
      if (idx > -1) state.carrito[idx].cantidad++;
      else state.carrito.push({ id, color, talle, nombre, precio: Number(precio), cantidad: 1 });
      
      showToast("Añadido al carrito");
      cerrarModal();
      renderCarrito();
    }

    function renderCarrito() {
      const ul = document.getElementById('lista-carrito');
      ul.innerHTML = "";
      let total = 0, cant = 0;
      
      state.carrito.forEach((item, i) => {
        total += item.precio * item.cantidad;
        cant += item.cantidad;
        ul.innerHTML += `
          <li class="flex justify-between items-center gap-1 border-b pb-2">
            <div><span class="font-bold">${item.nombre}</span><br><span class="text-xs text-gray-500">${item.color} | ${item.talle}</span></div>
            <div class="flex flex-col items-end">
              <span class="font-bold">$${item.precio} x ${item.cantidad}</span>
              <button onclick="window.eliminarDelCarrito(${i})" class="text-red-400 hover:text-red-600 text-xs mt-1 ml-auto">❌ Quitar</button>
            </div>
          </li>`;
      });
      
      document.getElementById('contador-carrito').textContent = cant;
      document.getElementById('acumulado-carrito').textContent = total;
      document.getElementById('total-carrito').textContent = total;
    }

    function eliminarDelCarrito(idx) { state.carrito.splice(idx, 1); renderCarrito(); }
    function vaciarCarrito() { state.carrito = []; renderCarrito(); }
    function toggleCarrito() { document.getElementById('carrito-lateral').classList.toggle('translate-x-full'); }
    function toggleSidebar() { 
      document.getElementById('sidebar-menu').classList.toggle('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }
    function filtrarOrdenar(e) { e.preventDefault(); state.orden = document.getElementById('select-orden').value; mostrarProductos(); }

    async function enviarWhatsApp() {
      if (!state.carrito.length) return showToast("El carrito está vacío");
      try {
        const updates = state.carrito.map(item => {
          const ref = doc(db, "productos", item.id);
          return updateDoc(ref, { [`stockPorVariante.${item.color}.${item.talle}`]: increment(-item.cantidad) });
        });
        await Promise.all(updates);

        let msj = `Hola! Quiero comprar:\n` + state.carrito.map(i => `${i.nombre} - ${i.color}, Talle ${i.talle} x${i.cantidad}`).join('\n');
        msj += `\nTotal: $${document.getElementById('total-carrito').textContent}`;
        
        vaciarCarrito();
        window.open(`https://wa.me/5493482600840?text=${encodeURIComponent(msj)}`, '_blank');
      } catch (e) {
        showToast("Error al procesar la compra.");
      }
    }

    // Exposición de funciones al objeto Window
    window.toggleSidebar = toggleSidebar;
    window.toggleCarrito = toggleCarrito;
    window.filtrarOrdenar = filtrarOrdenar;
    window.abrirModalDesdeCatalogo = abrirModalDesdeCatalogo;
    window.cerrarModal = cerrarModal;
    window.agregarAlCarrito = agregarAlCarrito;
    window.eliminarDelCarrito = eliminarDelCarrito;
    window.vaciarCarrito = vaciarCarrito;
    window.enviarWhatsApp = enviarWhatsApp;

    // Inicialización
    descargarCatalogo();
  </script>
</body>
</html>
