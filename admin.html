<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Firebase CDN modules -->
    <script type="module">
      // Importa las funciones principales de Firebase de su CDN oficial
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

      // Configuración Firebase
      const firebaseConfig = {
         apiKey: "AIzaSyDx8RYwqIC_-e5WL0QONC0O47MaeISpsYg",
         authDomain: "tienda-urba.firebaseapp.com",
         projectId: "tienda-urba",
         storageBucket: "tienda-urba.appspot.com",
         messagingSenderId: "224415070523",
         appId: "1:224415070523:web:0c1b10e48cb5440f0cdf1e"
      };

      // Inicializar app y Firestore
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // --------- NUEVO: Renderizado de la grilla de stock dinámico ---------
      function renderizarGrillaStock() {
        const contenedor = document.getElementById('contenedor-stock');
        if (!contenedor) return;
        // Limpiar antes
        contenedor.innerHTML = "";

        // Obtener colores (como array con trim y filtro)
        const coloresRaw = document.getElementById('colores-prod').value;
        const coloresArr = coloresRaw.split(',').map(c => c.trim()).filter(Boolean);

        // Obtener talles seleccionados (checkboxes marcados)
        const tallesArr = Array.from(document.querySelectorAll('input[name="talles"]:checked')).map(cb => cb.value);

        if (coloresArr.length === 0 || tallesArr.length === 0) {
          // Nada que mostrar
          return;
        }

        // Tablas de tailwind opcionales para mejor visual, o simple tabla
        let html = `<div class="overflow-x-auto"><table class="min-w-full border bg-white text-xs md:text-base"><thead><tr><th class="border p-2 bg-gray-100">Color</th>`;

        // Cabecera: cada talle como th
        tallesArr.forEach(talle => {
          html += `<th class="border p-2 bg-gray-100">${talle}</th>`;
        });
        html += "</tr></thead><tbody>";

        // Por cada color, una fila con un input por talle
        coloresArr.forEach(color => {
          html += `<tr><td class="border p-2 font-medium bg-gray-50">${color}</td>`;
          tallesArr.forEach(talle => {
            // ID predecible: ej: stock-blanco-XL, sin espacios
            const id = `stock-${color.replace(/\s+/g, '_')}-${talle.replace(/\s+/g, '_')}`;
            html += `<td class="border p-2">
                      <input type="number" min="0" value="0" id="${id}" class="w-16 p-1 border rounded text-center" />
                    </td>`;
          });
          html += "</tr>";
        });

        html += "</tbody></table></div>";

        contenedor.innerHTML = html;
      }

      // --------- Renderizado de inputs de imágenes por color y producto ---------
      function renderizarInputsImagenes() {
        const apartado = document.getElementById('imagenes-por-producto-color-apartado');
        const inputsContenedor = document.getElementById('inputs-imagenes-por-producto-color');
        if (!apartado || !inputsContenedor) return;

        // Obtener colores
        const coloresRaw = document.getElementById('colores-prod').value;
        const coloresArr = coloresRaw.split(',').map(c => c.trim()).filter(Boolean);

        // Mostrar u ocultar el apartado según si hay colores
        if (coloresArr.length === 0) {
          apartado.classList.add('hidden');
          inputsContenedor.innerHTML = "";
          return;
        } else {
          apartado.classList.remove('hidden');
        }

        // Renderizar input de imagen para cada color
        let html = '';
        coloresArr.forEach(color => {
          // Para mejor manejo de varios archivos, permite seleccionar varias imágenes
          html += `
            <div class="flex flex-col mb-2">
              <label class="text-sm font-semibold mb-1">Imágenes para color: <span class="italic">${color}</span></label>
              <input 
                type="file"
                name="imagenes-color-${color.replace(/\s+/g, '_')}"
                id="imagenes-color-${color.replace(/\s+/g, '_')}"
                accept="image/*"
                multiple
                class="block w-full border rounded px-3 py-2 text-sm bg-gray-50"
              >
            </div>
          `;
        });
        inputsContenedor.innerHTML = html;
      }

      // --- Listeners para actualizar la grilla y inputs imágenes por color ---
      document.addEventListener("DOMContentLoaded", () => {
        // Agregar eventListener a todos los checkboxes de talles (change)
        document.querySelectorAll('input[name="talles"]').forEach(cb => {
          cb.addEventListener('change', renderizarGrillaStock);
        });

        // Listener al input de colores (input)
        document.getElementById('colores-prod').addEventListener('input', function() {
          renderizarGrillaStock();
          renderizarInputsImagenes();
        });

        // También refrescar al cargar por si ya hay colores pre cargados (por ej: volver atrás)
        renderizarInputsImagenes();
      });

      // --------- / FIN NUEVO RENDER GRILLA STOCK Y INPUTS IMGS ----------
    </script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6">Agregar Nuevo Producto</h1>
        
        <form id="formulario-admin" class="space-y-4" autocomplete="off">

            <!-- Apartado para seleccionar género -->
            <div>
                <label class="block text-sm font-bold mb-1">Género</label>
                <select id="genero-prod" required class="w-full p-2 border rounded">
                    <option value="">Seleccionar género</option>
                    <option value="Mujer">Mujer</option>
                    <option value="Hombre">Hombre</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-1">Nombre del Producto</label>
                <input type="text" id="nombre-prod" required class="w-full p-2 border rounded">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-bold mb-1">Precio ($)</label>
                    <input type="text" id="precio-prod" 
                        required 
                        class="w-full p-2 border rounded"
                        inputmode="numeric" 
                        pattern="[0-9]+"
                        maxlength="8"
                        autocomplete="off"
                    >
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-bold mb-1">Categoría</label>
                    <select id="categoria-prod" class="w-full p-2 border rounded">
                        <option value="verano">Verano</option>
                        <option value="invierno">Invierno</option>
                    </select>
                </div>
            </div>

            <!-- Checkboxes de talles debajo de categoría -->
            <div>
                <label class="block text-sm font-bold mb-1">Talles</label>
                <div class="flex flex-wrap gap-x-3 gap-y-2">
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="S" class="accent-indigo-600"> <span>S</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="M" class="accent-indigo-600"> <span>M</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="L" class="accent-indigo-600"> <span>L</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="XL" class="accent-indigo-600"> <span>XL</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="Único" class="accent-indigo-600"> <span>Único</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Colores (separados por coma)</label>
                <input 
                    type="text" 
                    id="colores-prod"
                    placeholder="Ej: Blanco, Negro, Rojo" 
                    class="w-full p-2 border rounded"
                    autocomplete="off"
                    maxlength="200"
                >
                <span id="error-colores" class="hidden text-red-500 text-xs mt-1"></span>
            </div>

            <!-- Apartado para subir imagenes por cada producto y color -->
            <div id="imagenes-por-producto-color-apartado" class="hidden flex flex-col gap-2">
                <label class="block text-sm font-bold mb-1">Subir Imágenes por cada Producto y Color</label>
                <div id="inputs-imagenes-por-producto-color" class="flex flex-col gap-2"></div>
            </div>

            <!-- NUEVO: Grilla dinámica de stock -->
            <div id="contenedor-stock" class="mt-4"></div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded hover:bg-indigo-700">
                Guardar Producto
            </button>
        </form>

        <p id="mensaje-exito" class="hidden text-green-600 font-bold mt-4 text-center">¡Producto guardado exitosamente!</p>
        <p id="mensaje-error" class="hidden text-red-600 font-bold mt-4 text-center"></p>
    </div>
</body>
</html>
