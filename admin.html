<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Firebase CDN modules -->
    <script type="module">
      // Importa las funciones principales de Firebase de su CDN oficial
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

      // Configuraci처n Firebase
      const firebaseConfig = {
         apiKey: "AIzaSyDx8RYwqIC_-e5WL0QONC0O47MaeISpsYg",
         authDomain: "tienda-urba.firebaseapp.com",
         projectId: "tienda-urba",
         storageBucket: "tienda-urba.appspot.com",
         messagingSenderId: "224415070523",
         appId: "1:224415070523:web:0c1b10e48cb5440f0cdf1e"
      };

      // Inicializar app y Firestore
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Talles disponibles (s처lo los pedidos)
      const listaTalles = ["S", "M", "L", "XL", "횣nico"];

      // Utilidad: obtiene talles seleccionados actualmente
      function getTallesSeleccionados() {
        return Array.from(document.querySelectorAll('input[name="talles"]:checked')).map(cb => cb.value);
      }

      // Utilidad: obtiene array de colores
      function getColoresArray() {
        const coloresRaw = document.getElementById('colores-prod').value;
        return coloresRaw.split(",").map(c => c.trim()).filter(Boolean);
      }

      // Esta funci처n genera la tabla din찼mica de stock por variante, escuchando cambios en colores y talles
      function actualizarGridStock() {
        const coloresArr = getColoresArray();
        const tallesArr = getTallesSeleccionados();
        const gridContainer = document.getElementById('stock-por-variante-apartado');
        const tabla = document.getElementById('tabla-grid-stock');
        tabla.innerHTML = "";

        if (coloresArr.length === 0 || tallesArr.length === 0) {
          gridContainer.classList.add('hidden');
          return;
        }
        gridContainer.classList.remove('hidden');

        // CABECERA
        let thead = document.createElement('thead');
        let fila = '<tr><th class="border p-2 bg-gray-100">Color</th>';
        for (let t of tallesArr) {
          fila += `<th class="border p-2 bg-gray-100">${t}</th>`;
        }
        fila += "</tr>";
        thead.innerHTML = fila;
        tabla.appendChild(thead);

        // CUERPO
        let tbody = document.createElement('tbody');
        for (let color of coloresArr) {
          let tr = `<tr><td class="border p-2 font-medium bg-gray-50">${color}</td>`;
          for (let talle of tallesArr) {
            const cellInputId = `stock-${color.replace(/\s+/g, '_')}-${talle.replace(/\s+/g, '_')}`;
            tr += `
              <td class="border p-2">
                <input id="${cellInputId}" 
                       name="stock-grid" 
                       type="number" 
                       min="0" 
                       value="0"
                       class="w-16 p-1 border rounded text-center"
                       data-color="${color}"
                       data-talle="${talle}"
                />
              </td>
            `;
          }
          tr += "</tr>";
          tbody.innerHTML += tr;
        }
        tabla.appendChild(tbody);
      }

      // Validar solo letras/nros/espacios/comas en input colores
      document.addEventListener("DOMContentLoaded", () => {
        // Validacion input colores
        document.getElementById('colores-prod').addEventListener('input', function (e) {
          const original = this.value;
          const validado = original.replace(/[^a-zA-Z0-9찼챕챠처첬횁횋횒횙횣체횥챰횗 ,]/g, '');
          if (original !== validado) this.value = validado;
        });

        // Validacion: s처lo numeros en precio
        document.getElementById('precio-prod').addEventListener('input', function (e) {
          this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Gestionar la grilla de stock al cambiar colores
        document.getElementById('colores-prod').addEventListener('change', function () {
          // Manejo im찼genes por color
          const coloresRaw = this.value;
          const coloresArray = coloresRaw.split(',').map(c => c.trim()).filter(Boolean);
          const imgApartado = document.getElementById('imagenes-por-color-apartado');
          const container = document.getElementById('inputs-imagenes-por-color');
          container.innerHTML = '';
          if (coloresArray.length > 0) {
            imgApartado.classList.remove('hidden');
            coloresArray.forEach(color => {
              const id = 'img-color-' + color.replace(/\s+/g, '-').toLowerCase();
              const div = document.createElement('div');
              div.className = "flex items-center gap-3";
              div.innerHTML = `
                <label class="min-w-[80px] font-medium">${color}:</label>
                <input type="file" accept="image/*" id="${id}" data-color="${color}" multiple class="flex-1 p-2 border rounded bg-gray-50" />
              `;
              container.appendChild(div);
            });
          } else {
            imgApartado.classList.add('hidden');
          }
          actualizarGridStock();
        });

        // Gestionar la grilla de stock al cambiar talles (escuchando cualquier cambio)
        document.querySelectorAll('input[name="talles"]').forEach(cb => {
          cb.addEventListener('change', actualizarGridStock);
        });

        // Si el usuario cambia algo del input colores *mientras escribe*, tambi챕n actualiza grid al salir del input
        document.getElementById('colores-prod').addEventListener('blur', actualizarGridStock);

        // Evitar valores negativos
        document.addEventListener('input', function(e) {
          if (e.target && e.target.name === "stock-grid") {
            if (e.target.value < 0) e.target.value = 0;
          }
        });

        // SUBMIT
        document.getElementById('formulario-admin').addEventListener('submit', async function(evento) {
          evento.preventDefault();
          const submitButton = this.querySelector('button[type="submit"]');
          const originalBtnText = submitButton.textContent;

          // Estado visual de carga
          submitButton.textContent = "Guardando...";
          submitButton.disabled = true;
          submitButton.classList.add("opacity-70", "cursor-not-allowed");

          // Capturar valores
          const genero = document.getElementById('genero-prod').value;
          const nombre = document.getElementById('nombre-prod').value.trim();
          const precioInput = document.getElementById('precio-prod').value;
          const categoria = document.getElementById('categoria-prod').value;
          const coloresRaw = document.getElementById('colores-prod').value;
          const coloresArray = coloresRaw.split(',').map(c => c.trim()).filter(Boolean);
          const tallesSeleccionados = getTallesSeleccionados();

          // Resetear errores
          document.getElementById('mensaje-error').classList.add('hidden');
          document.getElementById('mensaje-exito').classList.add('hidden');
          document.getElementById('error-colores').classList.add('hidden');
          document.getElementById('error-colores').textContent = "";

          // Validaciones
          let erroresForm = [];
          if (!genero) {
            erroresForm.push("Debe seleccionar el g챕nero del producto.");
          }
          if (!nombre || !/^[a-zA-Z0-9찼챕챠처첬횁횋횒횙횣체횥챰횗\s]+$/.test(nombre)) {
            erroresForm.push("Nombre del producto obligatorio y debe ser solo letras/n첬meros.");
          }
          if (!precioInput || isNaN(precioInput) || !/^\d+$/.test(precioInput) || parseInt(precioInput) < 0) {
            erroresForm.push("El campo precio es obligatorio y debe contener solo n첬meros positivos.");
          }
          if (coloresArray.length === 0) {
            erroresForm.push("Debe ingresar al menos un color, separado por comas si es m찼s de uno.");
          } else {
            let algunColorInvalido = false;
            for (let color of coloresArray) {
              if (!/^[a-zA-Z0-9찼챕챠처첬횁횋횒횙횣체횥챰횗\s]+$/.test(color)) {
                algunColorInvalido = true;
                break;
              }
            }
            if (algunColorInvalido) {
              document.getElementById('error-colores').textContent = "S처lo se permiten letras y n첬meros por color.";
              document.getElementById('error-colores').classList.remove('hidden');
              erroresForm.push("Uno o m찼s colores tiene caracteres inv찼lidos.");
            }
          }
          if (tallesSeleccionados.length === 0) {
            erroresForm.push("Debe seleccionar al menos un talle.");
          }
          // Validaci처n de la grilla de stock: todos los inputs deben ser >= 0 y no vac챠os
          if (coloresArray.length > 0 && tallesSeleccionados.length > 0) {
            let inputsStock = document.querySelectorAll('input[name="stock-grid"]');
            let stockCountError = false;
            Array.from(inputsStock).forEach(input => {
              if (input.value.trim() === "" || isNaN(input.value) || parseInt(input.value) < 0) {
                stockCountError = true;
              }
            });
            if (stockCountError) {
              erroresForm.push("El stock por variante debe ser un n첬mero igual o mayor a cero para todas las combinaciones.");
            }
          }

          if (erroresForm.length > 0) {
            document.getElementById('mensaje-error').textContent = erroresForm.join(" ");
            document.getElementById('mensaje-error').classList.remove('hidden');
            submitButton.textContent = originalBtnText;
            submitButton.disabled = false;
            submitButton.classList.remove("opacity-70", "cursor-not-allowed");
            return;
          }

          // Capturar im찼genes por color como DataURL
          const imagenesPorColor = {};
          let pendingReads = 0;
          let readsFinished = false;
          const form = this;

          function checkAndSave() {
            if (pendingReads === 0 && readsFinished) {
              saveToFirestore();
            }
          }
          function processImages() {
            if(coloresArray.length > 0) {
              coloresArray.forEach(color => {
                const inputId = 'img-color-' + color.replace(/\s+/g, '-').toLowerCase();
                const input = document.getElementById(inputId);
                if (input && input.files.length > 0) {
                  imagenesPorColor[color] = [];
                  Array.from(input.files).forEach(file => {
                    pendingReads++;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                      imagenesPorColor[color].push(e.target.result);
                      pendingReads--;
                      checkAndSave();
                    };
                    reader.readAsDataURL(file);
                  });
                } else {
                  imagenesPorColor[color] = [];
                }
              });
            }
            readsFinished = true;
            checkAndSave();
          }

          // Recolectar stock por variante
          function obtenerStockPorVariante() {
            const stockPorVariante = {};
            coloresArray.forEach(color => {
              stockPorVariante[color] = {};
              tallesSeleccionados.forEach(talle => {
                const inputId = `stock-${color.replace(/\s+/g, '_')}-${talle.replace(/\s+/g, '_')}`;
                const input = document.getElementById(inputId);
                let valor = input && input.value !== "" && !isNaN(input.value) ? parseInt(input.value, 10) : 0;
                stockPorVariante[color][talle] = valor;
              });
            });
            return stockPorVariante;
          }

          async function saveToFirestore() {
            try {
              const stockPorVariante = obtenerStockPorVariante();
              const nuevoProducto = {
                // id no se guarda, Firestore lo crea
                genero: genero,
                nombre: nombre,
                precio: parseInt(precioInput),
                categoria: categoria,
                colores: coloresArray,
                imagenesPorColor: imagenesPorColor,
                talles: tallesSeleccionados,
                stockPorVariante: stockPorVariante
              };
              // Subir a firebase
              await addDoc(collection(db, "productos"), nuevoProducto);
              // 횋xito
              document.getElementById('mensaje-exito').classList.remove('hidden');
              form.reset();
              document.getElementById('imagenes-por-color-apartado').classList.add('hidden');
              document.getElementById('inputs-imagenes-por-color').innerHTML = '';
              document.getElementById('stock-por-variante-apartado').classList.add('hidden');
              document.getElementById('tabla-grid-stock').innerHTML = '';
              setTimeout(() => {
                document.getElementById('mensaje-exito').classList.add('hidden');
              }, 3000);
              submitButton.textContent = originalBtnText;
              submitButton.disabled = false;
              submitButton.classList.remove("opacity-70", "cursor-not-allowed");
            } catch (error) {
              document.getElementById('mensaje-error').textContent = "Error al guardar el producto. Intentalo nuevamente.";
              document.getElementById('mensaje-error').classList.remove('hidden');
              submitButton.textContent = originalBtnText;
              submitButton.disabled = false;
              submitButton.classList.remove("opacity-70", "cursor-not-allowed");
              console.error(error);
            }
          }

          processImages();
        });
      });
    </script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6">Agregar Nuevo Producto</h1>
        
        <form id="formulario-admin" class="space-y-4" autocomplete="off">

            <!-- Apartado para seleccionar g챕nero -->
            <div>
                <label class="block text-sm font-bold mb-1">G챕nero</label>
                <select id="genero-prod" required class="w-full p-2 border rounded">
                    <option value="">Seleccionar g챕nero</option>
                    <option value="Mujer">Mujer</option>
                    <option value="Hombre">Hombre</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-1">Nombre del Producto</label>
                <input type="text" id="nombre-prod" required class="w-full p-2 border rounded">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-bold mb-1">Precio ($)</label>
                    <input type="text" id="precio-prod" 
                        required 
                        class="w-full p-2 border rounded"
                        inputmode="numeric" 
                        pattern="[0-9]+"
                        maxlength="8"
                        autocomplete="off"
                    >
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-bold mb-1">Categor챠a</label>
                    <select id="categoria-prod" class="w-full p-2 border rounded">
                        <option value="verano">Verano</option>
                        <option value="invierno">Invierno</option>
                    </select>
                </div>
            </div>

            <!-- Checkboxes de talles debajo de categor챠a -->
            <div>
                <label class="block text-sm font-bold mb-1">Talles</label>
                <div class="flex flex-wrap gap-x-3 gap-y-2">
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="S" class="accent-indigo-600"> <span>S</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="M" class="accent-indigo-600"> <span>M</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="L" class="accent-indigo-600"> <span>L</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="XL" class="accent-indigo-600"> <span>XL</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="checkbox" name="talles" value="횣nico" class="accent-indigo-600"> <span>횣nico</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Colores (separados por coma)</label>
                <input 
                    type="text" 
                    id="colores-prod"
                    placeholder="Ej: Blanco, Negro, Rojo" 
                    class="w-full p-2 border rounded"
                    autocomplete="off"
                    maxlength="200"
                >
                <span id="error-colores" class="hidden text-red-500 text-xs mt-1"></span>
            </div>

            <!-- Apartado para subir fotos por color -->
            <div id="imagenes-por-color-apartado" class="hidden flex flex-col gap-2">
                <label class="block text-sm font-bold mb-1">Subir Foto para cada Color</label>
                <div id="inputs-imagenes-por-color" class="flex flex-col gap-2"></div>
            </div>

            <!-- Tabla de stock por variante -->
            <div id="stock-por-variante-apartado" class="hidden flex flex-col gap-2 mt-4">
                <label class="block text-sm font-bold mb-1">Stock por Color y Talle</label>
                <div class="overflow-x-auto max-w-full">
                    <table class="min-w-max border collapse bg-white text-xs md:text-base" id="tabla-grid-stock">
                        <!-- Llenado din찼micamente por JS -->
                    </table>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded hover:bg-indigo-700">
                Guardar Producto
            </button>
        </form>

        <p id="mensaje-exito" class="hidden text-green-600 font-bold mt-4 text-center">징Producto guardado exitosamente!</p>
        <p id="mensaje-error" class="hidden text-red-600 font-bold mt-4 text-center"></p>
    </div>
</body>
</html>
